name = "busybeaver"
version = "0.1.0"
defaultTargets = ["beaver"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4"
rev = "v4.32.1"

[[require]]
name = "Cli"
git = "https://github.com/leanprover/lean4-cli"
rev = "v4.32.0"

[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"

[[require]]
name = "leansqlite"
git = "https://github.com/leanprover/leansqlite"
rev = "v4.31.0"

[[require]]
name = "lean-tqdm"
git = "https://github.com/mfornet/lean-tqdm"
rev = "main"

[[lean_lib]]
name = "Busybeaver"

[[lean_lib]]
name = "Witness"

# Gated value theorems (BB(2,2) … BB(5,2)): NOT in defaultTargets, so plain
# `lake build` skips them. Build explicitly with `lake build BBTheorems`
# (or a single module, e.g. `lake build BBTheorems.BB4`). BB5 takes hours.
[[lean_lib]]
name = "BBTheorems"

[[lean_exe]]
name = "beaver"
root = "Main"
