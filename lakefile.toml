name = "busybeaver"
version = "0.1.0"
defaultTargets = ["beaver"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4"
rev = "v4.31.0"

[[require]]
name = "Cli"
git = "https://github.com/leanprover/lean4-cli"
rev = "v4.31.0"

[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"

[[require]]
name = "leansqlite"
git = "https://github.com/leanprover/leansqlite"
rev = "v4.31.0"

[[lean_lib]]
name = "Busybeaver"

[[lean_lib]]
name = "Witness"

[[lean_exe]]
name = "beaver"
root = "Main"
